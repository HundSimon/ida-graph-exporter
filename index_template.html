<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="dark">
    <meta name="darkreader" content="ignore">
    <meta name="darkreader-lock" content="true">
    <title>graph</title>

    <style>
        /* http://meyerweb.com/eric/tools/css/reset/ 
        v2.0 | 20110126
        License: none (public domain)
        */

        html, body, div, span, applet, object, iframe,
        h1, h2, h3, h4, h5, h6, p, blockquote, pre,
        a, abbr, acronym, address, big, cite, code,
        del, dfn, em, img, ins, kbd, q, s, samp,
        small, strike, strong, sub, sup, tt, var,
        b, u, i, center,
        dl, dt, dd, ol, ul, li,
        fieldset, form, label, legend,
        table, caption, tbody, tfoot, thead, tr, th, td,
        article, aside, canvas, details, embed, 
        figure, figcaption, footer, header, hgroup, 
        menu, nav, output, ruby, section, summary,
        time, mark, audio, video {
            margin: 0;
            padding: 0;
            border: 0;
            font-size: 100%;
            font: inherit;
            vertical-align: baseline;
        }
        /* HTML5 display-role reset for older browsers */
        article, aside, details, figcaption, figure, 
        footer, header, hgroup, menu, nav, section {
            display: block;
        }
        body {
            line-height: 1;
        }
        ol, ul {
            list-style: none;
        }
        blockquote, q {
            quotes: none;
        }
        blockquote:before, blockquote:after,
        q:before, q:after {
            content: '';
            content: none;
        }
        table {
            border-collapse: collapse;
            border-spacing: 0;
        }

    </style>

    <style>
        body {
            background-color: rgb(176, 176, 176);
            color-scheme: dark;
            overflow: hidden;
        }

        .graph {
            /* this is picked empirically and is very sensitive to display properties */
            /* note that --graph-font-size is updated from fixupFontSize() to make things work at runtime */

            /* 20 from my desktop monitor */
            /* 16 from my laptop monitor */
            font-family: "DejaVu Sans Mono", "Consolas", "Menlo", "Liberation Mono", monospace;
            font-size: var(--graph-font-size, 24px);
            font-weight: 600;
            -moz-osx-font-smoothing: grayscale;
            -webkit-font-smoothing: antialiased;
            /* way too big */
            line-height: var(--graph-line-height, 2.0);
        }

        .basic-block {
            position: fixed;
            margin: -1px;
            border: 1px solid black;
            background-color: #252525;
            box-shadow: 4px 4px 2px rgba(0, 0, 0, 0.28);
            color: #d8d8d8;
            overflow: hidden;
        }

        .basic-block .basic-block-header {
            height: 20px;
            width: 100%;
            border-bottom: 1px solid black;
            background-color: #efefef;
        }


        .disassembly-line {
            display: inline-block;
            width: 100%;
        }

        .disassembly-line pre {
            font: inherit;
            margin-left: 3px;
        }

        .disassembly-line * .token-address {
            text-decoration: none;
            color: var(--COLOR_CODNAME);
        }

        svg.edge-line {
            position: fixed;
            top: 0px;
            left: 0px;
            overflow: visible;
        }

        svg.edge-line polyline {
            fill: none;
            stroke-width: 1;
            stroke-linecap: round;
        }

        svg.edge-line polygon {
            stroke: none;
        }
    </style>
    
    <script>
        const COLOR_INDICES = {
            'COLOR_DEFAULT': 0x1,
            'COLOR_REGCMT': 0x2,
            'COLOR_RPTCMT': 0x3,
            'COLOR_AUTOCMT': 0x4,
            'COLOR_INSN': 0x5,
            'COLOR_DATNAME': 0x6,
            'COLOR_DNAME': 0x7,
            'COLOR_DEMNAME': 0x8,
            'COLOR_SYMBOL': 0x9,
            'COLOR_CHAR': 0xa,
            'COLOR_STRING': 0xb,
            'COLOR_NUMBER': 0xc,
            'COLOR_VOIDOP': 0xd,
            'COLOR_CREF': 0xe,
            'COLOR_DREF': 0xf,
            'COLOR_CREFTAIL': 0x10,
            'COLOR_DREFTAIL': 0x11,
            'COLOR_ERROR': 0x12,
            'COLOR_PREFIX': 0x13,
            'COLOR_BINPREF': 0x14,
            'COLOR_EXTRA': 0x15,
            'COLOR_ALTOP': 0x16,
            'COLOR_HIDNAME': 0x17,
            'COLOR_LIBNAME': 0x18,
            'COLOR_LOCNAME': 0x19,
            'COLOR_CODNAME': 0x1A,
            'COLOR_ASMDIR': 0x1B,
            'COLOR_MACRO': 0x1C,
            'COLOR_DSTR': 0x1D,
            'COLOR_DCHAR': 0x1E,
            'COLOR_DNUM': 0x1F,
            'COLOR_KEYWORD': 0x20,
            'COLOR_REG': 0x21,
            'COLOR_IMPNAME': 0x22,
            'COLOR_SEGNAME': 0x23,
            'COLOR_UNKNAME': 0x24,
            'COLOR_CNAME': 0x25,
            'COLOR_UNAME': 0x26,
            'COLOR_COLLAPSED': 0x27,
            'COLOR_ADDR': 0x28,
            'COLOR_OPND1': 0x29,
            'COLOR_OPND2': 0x2A,
            'COLOR_OPND3': 0x2B,
            'COLOR_OPND4': 0x2C,
            'COLOR_OPND5': 0x2D,
            'COLOR_OPND6': 0x2E,
            'COLOR_OPND7': 0x2F,
            'COLOR_OPND8': 0x30,
            'COLOR_UTF8': 0x32,
            'RESERVED1': 0x33,
            'LUMINA': 0x34,
        };

        const DEFAULT_CLR = `
            [DISASM]
            000000	 //
            d8d8d8	 //Default color
            d8a0d8	 //Regular comment
            d8a0d8	 //Repeatable comment
            d8a0d8	 //Automatic comment
            e6e6e6	 //Instruction
            00d2ff	 //Dummy Data Name
            00d2ff	 //Regular Data Name
            00d2ff	 //Demangled Name
            c8c8c8	 //Punctuation
            3a6aff	 //Char constant in instruction
            75d475	 //String constant in instruction
            3a6aff	 //Numeric constant in instruction
            b8b866	 //Void operand
            00d2ff	 //Code reference
            b8b866	 //Data reference
            00d2ff	 //Code reference to tail byte
            b8b866	 //Data reference to tail byte
            4040ff	 //Error or problem
            707070	 //Line prefix
            909090	 //Binary line prefix bytes
            707070	 //Extra line
            3a6aff	 //Alternative operand
            707070	 //Hidden name
            00d2ff	 //Library function name
            b8b866	 //Local variable name
            00d2ff	 //Dummy code name
            00e0a8	 //Assembler directive
            80b0ff	 //Macro
            75d475	 //String constant in data directive
            3a6aff	 //Char constant in data directive
            3a6aff	 //Numeric constant in data directive
            e6e6e6	 //Keywords
            b8b866	 //Register name
            b880ff	 //Imported name
            b8b866	 //Segment name
            00d2ff	 //Dummy unknown name
            00d2ff	 //Regular code name
            00d2ff	 //Regular unknown name
            707070	 //Collapsed line
            000000	 //Max color number
            ffffff	 //Line prefix: library function
            afbbc0	 //Line prefix: regular function
            ffff00	 //Line prefix: instruction
            000000	 //Line prefix: data
            000080	 //Line prefix: unexplored
            808080	 //Line prefix: externs
            008080	 //Line prefix: current item
            ff00ff	 //Line prefix: current line
            000000	 //Punctuation
            ff0000	 //Opcode bytes
            000000	 //Manual operand
            [NAVBAR]
            ffffaa	 //Library function
            e8a200	 //Regular function
            577ab9	 //Instruction
            c0c0c0	 //Data item
            6bb6b6	 //Unexplored
            ffa6ff	 //External symbol
            5b5bff	 //Errors
            000000	 //Gaps
            7fffff	 //Cursor
            00aaff	 //Address
            [DEBUG]
            ffd060	 //Current IP
            ffa0a0	 //Current IP (+ enabled breakpoint)
            408020	 //Current IP (+ disabled breakpoint)
            ffffcc	 //Default background
            0000ff	 //Address (+ enabled breakpoint)
            00ff00	 //Address (+ disabled breakpoint)
            004080	 //Current IP (+ unavailable breakpoint)
            0080ff	 //Address (+ unavailable breakpoint)
            000000	 //Registers
            ff0000	 //Registers (changed)
            800080	 //Registers (edited)
            [ARROW]
            c0c0c0	 //Jump in current function
            0000ff	 //Jump external to function
            000000	 //Jump under the cursor
            008000	 //Jump target
            ff4040	 //Register target
            [GRAPH]
            ffffff	 //Top color
            fff8e0	 //Bottom color
            ffffff	 //Normal title
            f9f9b1	 //Selected title
            cfcfa0	 //Current title
            00ffff	 //Group frame
            000000	 //Node shadow
            ffffcc	 //Highlight color 1
            ccffcc	 //Highlight color 2
            0000ff	 //Foreign node
            ff0000	 //Normal edge
            008000	 //Yes edge
            0000ff	 //No edge
            ff00ff	 //Highlighted edge
            ffff00	 //Current edge
            [MISC]
            000000	 //Message text
            ffffff	 //Message background
            404080	 //Patched bytes
            0080ff	 //Unsaved changes
            [OTHER]
            00ffff	 //Highlight color
            e1ffff	 //Hint color
            [SYNTAX]
            ff0000	0	0	 //Keyword 1
            800080	0	0	 //Keyword 2
            0000ff	0	0	 //Keyword 3
            00008b	0	0	 //String
            006400	0	1	 //Comment
            ff0000	1	0	 //Preprocessor
            8b8b00	1	0	 //Number
        `;

        function color_to_rgb(color) {
            return color.substring(4, 6) + color.substring(2, 4) + color.substring(0, 2);
        }

        const clr_colors = [];
        for (let line of DEFAULT_CLR.split("[DISASM]")[1].split("[NAVBAR]")[0].split("\n")) {
            line = line.trim();
            if (line.length === 0) {
                continue;
            }

            let color = line.split("	")[0];
            color = color_to_rgb(color);

            clr_colors.push(color);
        }

        function getColor(color) {
            return clr_colors[COLOR_INDICES[color]];
        }

        const root = document.querySelector(':root');
        for (const name of Object.keys(COLOR_INDICES)) {
            const color = getColor(name);
            root.style.setProperty(`--${name}`, `#${color}`);
        }

        function appendChild(parent, child) {
            if (child === null || child === undefined || child === false) {
                return;
            }

            if (Array.isArray(child)) {
                child.forEach(item => appendChild(parent, item));
                return;
            }

            if (child instanceof Node) {
                parent.appendChild(child);
                return;
            }

            parent.appendChild(document.createTextNode(String(child)));
        }

        function createElement(tag, attributes = {}, children = []) {
            const element = document.createElement(tag);

            for (const [name, value] of Object.entries(attributes)) {
                if (value === null || value === undefined || value === false) {
                    continue;
                }

                if (name === "className") {
                    element.className = value;
                } else if (name === "style" && typeof value === "object") {
                    Object.assign(element.style, value);
                } else if (name === "textContent") {
                    element.textContent = value;
                } else {
                    element.setAttribute(name, value);
                }
            }

            appendChild(element, children);
            return element;
        }

        function createSvgElement(tag, attributes = {}, children = []) {
            const element = document.createElementNS("http://www.w3.org/2000/svg", tag);

            for (const [name, value] of Object.entries(attributes)) {
                if (value === null || value === undefined || value === false) {
                    continue;
                }

                element.setAttribute(name, value);
            }

            appendChild(element, children);
            return element;
        }

        // parse the sequence of IDA color tokens into a tree.
        // nodes in the tree look like:
        //   - type: string = "string" | "color" | "address"
        //   - children: List[Node]
        //
        // string nodes have additional field "string".
        // color nodes have additional field "color".
        // address nodes have additional fields "address" and "string".
        function parseTokens(parent, tokens) {
            while (tokens.length > 0) {
                let node = null;

                const token = tokens.shift();
                if (token.type === "string") {
                    parent.children.push({
                        "type": "string",
                        "string": token.string,
                    });
                } else if (token.type === "coloron") {
                    if (token.color === "COLOR_PREFIX") {
                        // special case handling of COLOR_PREFIX,
                        // since IDA seems to emit this without a closing tag.
                        const next_token = tokens.shift();
                        if (next_token === undefined) {
                            // no next, skip this node
                            return;
                        } else {
                            console.assert(next_token.type === "string", "after prefix is not string");

                            parent.children.push({
                                "type": "color",
                                "color": "COLOR_PREFIX",
                                "children": [next_token],
                            })
                        }
                    } else {
                        const node = {
                            "type": "color",
                            "color": token.color,
                            "children": [],
                        };
                        parent.children.push(node);
                        parseTokens(node, tokens);

                        const off_token = tokens.shift();
                        console.assert(token.color == off_token.color, "pop wrong color");
                    }
                } else if (token.type === "coloroff") {
                    tokens.unshift(token);
                    return;
                } else if (token.type === "address") {
                    const next_token = tokens.shift();

                    if (next_token.type !== "string") {
                        tokens.unshift(next_token);
                    } else {
                        parent.children.push({
                            "type": "address",
                            "address": token.address,
                            "string": next_token.string,
                        });
                    }
                } else {
                    console.error("unexpected", token);
                }
            }
        }

        function getCssColor(color_name) {
            if (!Object.prototype.hasOwnProperty.call(COLOR_INDICES, color_name)) {
                return "";
            }

            return `var(--${color_name})`;
        }

        function renderTokens(node, prefix_color_name) {
            if (node.type === "string") {
                return createElement("span", {textContent: node.string});
            } else if (node.type === "root") {
                const fragment = document.createDocumentFragment();
                appendChild(fragment, node.children.map(child => renderTokens(child, prefix_color_name)));
                return fragment;
            } else if (node.type === "color" && node.color == "COLOR_PREFIX") {
                const children = node.children.map(child => renderTokens(child, prefix_color_name));
                return createElement("span", {style: {color: getCssColor(prefix_color_name)}}, children);
            } else if (node.type === "color") {
                const children = node.children.map(child => renderTokens(child, prefix_color_name));
                return createElement("span", {style: {color: `var(--${node.color})`}}, children);
            } else if (node.type === "address") {
                return createElement("a", {
                    href: `#${node.address}`,
                    className: "token-address",
                }, createElement("span", {textContent: node.string}));
            } else {
                console.error("unexpected", node);
            }
        }

        function renderDisassemblyLine(line) {
            const tokens = [...line.tokens];

            const root = {
                "type": "root",
                "children": [],
            };

            parseTokens(root, tokens);

            // TODO: bg color, broken.

            const pre = createElement("pre", {}, renderTokens(root, line.prefix_color_name));
            return createElement("p", {className: "disassembly-line"}, pre);
        }

        function renderLocation(location) {
            const children = [
                createElement("span", {
                    id: location.address,
                    className: "anchor",
                }),
                location.lines.map(renderDisassemblyLine),
            ];

            return createElement("div", {className: "location"}, children);
        }

        function renderBasicBlock(basic_block) {
            let {top, left, bottom, right} = basic_block.rect;
            let height = bottom - top;
            let width = right - left;

            const children = [
                createElement("div", {className: "basic-block-header"}),
                basic_block.locations.map(renderLocation),
            ];

            return createElement("div", {
                className: "basic-block",
                style: {
                    top: `${top}px`,
                    left: `${left}px`,
                    height: `${height}px`,
                    width: `${width}px`,
                },
            }, children);
        }

        const EDGE_COLORS = {
            normal: "#1f58ff",
            true: "#2aa02a",
            false: "#d00000",
        };

        const LEGACY_EDGE_COLOR_TYPES = {
            0x43: "normal",
            0x44: "true",
            0x45: "false",
        };

        function getLegacyEdgeType(edge) {
            if (typeof edge.color !== "string") {
                return null;
            }

            const color = Number.parseInt(edge.color, 16);
            if (!Number.isFinite(color)) {
                return null;
            }

            return LEGACY_EDGE_COLOR_TYPES[color & 0xff] || null;
        }

        function getEdgeType(edge) {
            return edge.edge_type || getLegacyEdgeType(edge) || "normal";
        }

        function getEdgeColor(edge) {
            return EDGE_COLORS[getEdgeType(edge)] || EDGE_COLORS.normal;
        }

        function getArrowPoints(points) {
            if (points.length < 2) {
                return "";
            }

            const end = points[points.length - 1];
            let start = null;
            for (let i = points.length - 2; i >= 0; i--) {
                const point = points[i];
                if (point.x !== end.x || point.y !== end.y) {
                    start = point;
                    break;
                }
            }

            if (start === null) {
                return "";
            }

            const dx = end.x - start.x;
            const dy = end.y - start.y;
            const length = Math.hypot(dx, dy);
            if (length === 0) {
                return "";
            }

            const unitX = dx / length;
            const unitY = dy / length;
            const arrowLength = 10;
            const arrowWidth = 8;
            const baseX = end.x - unitX * arrowLength;
            const baseY = end.y - unitY * arrowLength;
            const perpX = -unitY * arrowWidth / 2;
            const perpY = unitX * arrowWidth / 2;

            return [
                `${end.x},${end.y}`,
                `${baseX + perpX},${baseY + perpY}`,
                `${baseX - perpX},${baseY - perpY}`,
            ].join(" ");
        }

        function renderEdge(edge) {
            const points = edge.points.map(point => `${point.x},${point.y}`).join(" ");
            const color = getEdgeColor(edge);
            const arrowPoints = getArrowPoints(edge.points);

            return createSvgElement("svg", {class: "edge-line"}, [
                createSvgElement("polyline", {points, stroke: color}),
                arrowPoints && createSvgElement("polygon", {points: arrowPoints, fill: color}),
            ]);
        }

        function setupPannable(background, foreground, initialPosition = {x: 0, y: 0}) {
            // via: https://codepen.io/loxks/details/KKpVvVW
            let isDown = false;

            // the position of the cursor at the start of a drag.
            let startX = 0;
            let startY = 0;

            // the position of the foreground at the start of a drag.
            // this is updated when a drag completes.
            let x = initialPosition.x;
            let y = initialPosition.y;
            let scale = 1;

            let velX = 0;
            let velY = 0;

            // the position of the cursor at the last mousemove event
            let lastX = 0;
            let lastY = 0;

            // TODO: enable touch interactions
            function getTransform(nextX = x, nextY = y, nextScale = scale) {
                return `translateX(${nextX}px) translateY(${nextY}px) scale(${nextScale})`;
            }

            function updatePosition(nextX = x, nextY = y, nextScale = scale) {
                x = nextX;
                y = nextY;
                scale = nextScale;
                foreground.style.transform = getTransform();
            }

            foreground.style.transformOrigin = "0 0";
            updatePosition();

            background.addEventListener("mousedown", (e) => {
                e.preventDefault();
                isDown = true;
                background.classList.add("active");
                background.style.userSelect = "none";
                // TODO: style: set cursor: grabbing

                startX = e.pageX;
                startY = e.pageY;
                lastX = e.pageX;
                lastY = e.pageY;
                cancelMomentumTracking();
            });

            const finish_drag = (e) => {
                if (!isDown) {
                    return;
                }

                isDown = false;
                background.classList.remove("active");

                const dx = e.pageX - startX;
                const dy = e.pageY - startY;

                updatePosition(x + dx, y + dy);
            };

            window.addEventListener("mouseup", (e) => {
                if (!isDown) {
                    return;
                }

                finish_drag(e);
                beginMomentumTracking();
            });

            window.addEventListener("mousemove", (e) => {
                if (!isDown) {
                    return;
                }
                e.preventDefault();

                const dx = e.pageX - startX;
                const dy = e.pageY - startY;

                foreground.style.transform = getTransform(x + dx, y + dy);

                velX = e.pageX - lastX;
                velY = e.pageY - lastY;

                lastX = e.pageX;
                lastY = e.pageY;
            });

            function normalizeWheelDelta(value, deltaMode, pageSize) {
                if (deltaMode === WheelEvent.DOM_DELTA_LINE) {
                    return value * 32;
                }

                if (deltaMode === WheelEvent.DOM_DELTA_PAGE) {
                    return value * pageSize;
                }

                return value;
            }

            function clamp(value, min, max) {
                return Math.min(max, Math.max(min, value));
            }

            background.addEventListener("wheel", (e) => {
                e.preventDefault();
                e.stopPropagation();
                cancelMomentumTracking();
                velX = 0;
                velY = 0;

                const wheelX = normalizeWheelDelta(e.deltaX, e.deltaMode, background.clientWidth);
                const wheelY = normalizeWheelDelta(e.deltaY, e.deltaMode, background.clientHeight);

                if (e.ctrlKey) {
                    const nextScale = clamp(scale * Math.exp(-wheelY * 0.001), 0.25, 4);
                    const rect = background.getBoundingClientRect();
                    const pointerX = e.clientX - rect.left;
                    const pointerY = e.clientY - rect.top;
                    const ratio = nextScale / scale;

                    updatePosition(
                        pointerX - (pointerX - x) * ratio,
                        pointerY - (pointerY - y) * ratio,
                        nextScale,
                    );
                    return;
                }

                const dx = e.shiftKey ? -wheelY : -wheelX;
                const dy = e.shiftKey ? -wheelX : -wheelY;
                updatePosition(x + dx, y + dy);
            }, {passive: false});

            // Momentum

            let momentumID = 0;
            function beginMomentumTracking() {
                cancelMomentumTracking();
                momentumID = requestAnimationFrame(momentumLoop);
            }

            function cancelMomentumTracking() {
                cancelAnimationFrame(momentumID);
            }

            const momentumLoop = () => {
                updatePosition(x + velX, y + velY);

                velX *= 0.9;
                velY *= 0.9;

                if (Math.abs(velX) > 0.5 || Math.abs(velY) > 0.5) {
                    momentumID = requestAnimationFrame(momentumLoop);
                }
            };
        }

        function createPannable(children, initialPosition) {
            const foreground = createElement("div", {
                className: "pannable-foreground",
                style: {
                    position: "fixed",
                    top: "0px",
                    left: "0px",
                    width: "100%",
                    height: "100%",
                },
            }, children);

            const background = createElement("div", {
                className: "pannable-background",
                style: {
                    position: "fixed",
                    top: "0px",
                    left: "0px",
                    width: "100%",
                    height: "100%",
                    overflow: "hidden",
                },
            }, foreground);

            setupPannable(background, foreground, initialPosition);
            return background;
        }

        function getGraphBounds(graph) {
            const bounds = {
                minX: Infinity,
                minY: Infinity,
            };

            for (const block of graph.basic_blocks) {
                bounds.minX = Math.min(bounds.minX, block.rect.left);
                bounds.minY = Math.min(bounds.minY, block.rect.top);
            }

            for (const edge of graph.edges) {
                for (const point of edge.points) {
                    bounds.minX = Math.min(bounds.minX, point.x);
                    bounds.minY = Math.min(bounds.minY, point.y);
                }
            }

            if (!Number.isFinite(bounds.minX) || !Number.isFinite(bounds.minY)) {
                return {minX: 0, minY: 0};
            }

            return bounds;
        }

        function addressToBigInt(address) {
            if (typeof address !== "string") {
                return null;
            }

            try {
                return BigInt(`0x${address}`);
            } catch (e) {
                return null;
            }
        }

        function getEntryBlock(graph) {
            const entryAddress = addressToBigInt(graph.entry_address || graph.address);
            if (entryAddress === null) {
                return graph.basic_blocks[0] || null;
            }

            return graph.basic_blocks.find(block => {
                const start = addressToBigInt(block.range.start);
                const end = addressToBigInt(block.range.end);
                return start !== null && end !== null && start <= entryAddress && entryAddress < end;
            }) || graph.basic_blocks[0] || null;
        }

        function getInitialGraphPosition(graph) {
            const padding = 24;
            const entryBlock = getEntryBlock(graph);
            if (entryBlock) {
                const viewportWidth = document.documentElement.clientWidth || window.innerWidth;
                const blockCenter = (entryBlock.rect.left + entryBlock.rect.right) / 2;
                return {
                    x: viewportWidth / 2 - blockCenter,
                    y: padding - entryBlock.rect.top,
                };
            }

            const bounds = getGraphBounds(graph);
            return {
                x: padding - bounds.minX,
                y: padding - bounds.minY,
            };
        }

        function renderGraph(graph) {
            const children = [
                // order of these elements is important, because they draw on top of each other, due to fixed layout

                graph.edges.map(renderEdge),

                graph.basic_blocks.map(renderBasicBlock),
            ];

            return createElement("div", {
                className: "graph",
                style: {
                    height: "100%",
                    width: "100%",
                },
            }, createPannable(children, getInitialGraphPosition(graph)));
        }

        function renderApp(graph) {
            const fragment = document.createDocumentFragment();
            fragment.appendChild(renderGraph(graph));
            return fragment;
        }

        function needsFontResize() {
            // are there any disassembly lines (.location) that need more space than they have?
            // the +6 is a fudge factor to account for padding.
            return [...document.getElementsByClassName("disassembly-line")].filter(el => (el.scrollWidth - el.offsetWidth > 0)).length > 0;
        }

        function needsLineHeightResize() {
            return [...document.getElementsByClassName("basic-block")].filter(el => (el.scrollHeight - el.offsetHeight > 0)).length > 0;
        }

        function fixupFontSize() {
            // the IDA graph view export is very sensitive to font size.
            // this is because IDA/Qt uses the screen resolution and pixel density
            // to compute the node sizes and layout, and also relies on font choice, size, etc.
            // while we can try to reproduce this in HTML/CSS, it'll probably never be perfect.
            //
            // so, we try to detect when the text is too big for the boxes, and then
            // reduce the text size until things fit.
            let size = 24;

            while (needsFontResize()) {
                size -= 0.2;
                if (size <= 0) {
                    break;
                }

                document.querySelector(":root").style.setProperty("--graph-font-size", `${size}px`); 
            }
        }

        function fixupLineHeight() {
            // the IDA graph view export is very sensitive to font size.
            // this is because IDA/Qt uses the screen resolution and pixel density
            // to compute the node sizes and layout, and also relies on font choice, size, etc.
            // while we can try to reproduce this in HTML/CSS, it'll probably never be perfect.
            //
            // so, we try to detect when the text is too big for the boxes, and then
            // reduce the line height until things fit.
            let size = 2.0;

            while (needsLineHeightResize()) {
                size -= 0.02;
                if (size <= 0) {
                    break;
                }

                document.querySelector(":root").style.setProperty("--graph-line-height", `${size}`); 
            }
        }

        async function main() {
            const data = "__DATA__";

            console.log(data);
            document.title = `${data.sha256}: ${data.address}`;

            document.body.textContent = "";
            document.body.appendChild(renderApp(data));

            // these are a huge hack, but they do make the layout much more precise
            // even when using different fonts.
            //
            // another hack: assume the graph is rendered within 16ms.
            fixupFontSize();
            fixupLineHeight();
            setTimeout(fixupFontSize, 16);
            setTimeout(fixupLineHeight, 16);
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", main);
        } else {
            main();
        }
    </script>
